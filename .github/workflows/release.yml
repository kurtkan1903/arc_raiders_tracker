name: ARC Raiders Tracker Release

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Bu satır robotun dosya yüklemesini garanti eder

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Extract Version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1)
          echo "VERSION=v$VERSION" >> $GITHUB_OUTPUT
          echo "Found Version: $VERSION"

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Create or Update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.get_version.outputs.VERSION }}
          name: ARC Raiders Tracker ${{ steps.get_version.outputs.VERSION }}
          artifacts: "build/app/outputs/flutter-apk/app-release.apk"
          allowUpdates: true  # Aynı versiyon varsa üstüne yazar
          token: ${{ secrets.GITHUB_TOKEN }}
